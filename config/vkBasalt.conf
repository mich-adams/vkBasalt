#effects is a colon seperated list of effect to use
#effects will be run in order from left to right
#cas           - Contrast Adaptive Sharpening
#dls           - Denoised Luma Sharpening
#fxaa          - Fast Approximate Anti-Aliasing
#smaa          - Enhanced Subpixel Morphological Antialiasing
#lut           - Color LookUp Table
#dpx           - Cineon DPX color grading
#liftgammagain - Lift Gamma Gain
#sepia         - Sepia tint
#vibrance      - Saturates undersaturated colors
#lensflare     - Lens Flare
#reinhard      - Reinhard Tone Mapping
effects = smaa:lensflare:reinhard:dls:filmgrain

reshadeTexturePath = "/home/michael/Games/vkBasalt/textures"
reshadeIncludePath = "/home/michael/Games/vkBasalt/shaders"
filmgrain = "~/Games/vkBasalt/shaders/FilmGrain.fx"

depthCapture = off

#toggleKey toggles the effects on/off
toggleKey = Home

#enableOnLaunch sets if the effects are enabled when started
enableOnLaunch = True

#Specifies the amount of sharpning in the CAS shader.
#0.0 less sharp, less artefacts, but not off
#1.0 maximum sharp more artefacts
#Everything in between is possible
#negative values sharpen even less, up to -1.0 make a visible difference
casSharpness = 0.4

#Specifies the amount of sharpening in the Denoised Luma Sharpening shader.
#Increase to sharpen details within the image.
#0.0 less sharp, less artefacts, but not off
#1.0 maximum sharp more artefacts
dlsSharpness = 0.5

#Specifies the amount of denoising in the Denoised Luma Sharpening shader.
#Increase to limit how intensely film grain within the image gets sharpened.
#Range: [0-1]
dlsDenoise = 0.17

#Range: 0.0 to 1.0
dpxContrast = 0.1
#Range: 0.0 to 8.0
dpxSaturation = 3.0
#Range: 0.0 to 1.0
dpxStrength = 0.02

#Can effect sharpness.
#1.00 - upper limit (softer)
#0.75 - default amount of filtering
#0.50 - lower limit (sharper, less sub-pixel aliasing removal)
#0.25 - almost off
#0.00 - completely off
fxaaQualitySubpix = 0.75

#Minimum amount of local contrast required to apply algorithm.
#0.333 - too little (faster)
#0.250 - low quality
#0.166 - default
#0.125 - high quality 
#0.063 - overkill (slower)
fxaaQualityEdgeThreshold = 0.125

#Trims the algorithm from processing darks.
#0.0833 - upper limit (default, the start of visible unfiltered edges)
#0.0625 - high quality (faster)
#0.0312 - visible limit (slower)
#Special notes: due to the current implementation you
#Likely want to set this to zero.
#As colors that are mostly not-green
#will appear very dark in the green channel!
#Tune by looking at mostly non-green content,
#then start at zero and increase until aliasing is a problem.
fxaaQualityEdgeThresholdMin = 0.0312

#Changes the edge detection shader
#0 - luma  - default
#1 - color - might catch more edges, but is more expensive
#2 - depth - uses depth buffer to find edges, doesn't touch UI. Doesn't fix texture aliasing.
#3 - normal + depth - uses screen-space normals and depth to find edges.
#More coverage than depth-only, but still limited to geometry
smaaEdgeDetection = 0

#Specifies the threshold or sensitivity to edges in luma or color modes
#Lowering this value you will be able to detect more edges at the expense of performance.
#Range: [0, 0.5]
#0.1 is a reasonable value, and allows to catch most visible edges.
#0.05 is a rather overkill value, that allows to catch 'em all.
smaaThreshold = 0.05

#smaaDepthThreshold specifies the threshold or sensitivity to edges in depth mode
#Lowering this value you will be able to detect more edges at the expense of performance.
#Range: [0, 0.1]
#0.010 is a reasonable value, and allows to catch most geometry edges.
#0.003 is a rather overkill value, may have false positives at shallow angles.
smaaDepthThreshold = 0.01

#Specifies the threshold or sensitivity to edges in normal mode
#Lowering this value you will be able to detect more edges at the expense of performance.
#0.010 is a reasonable value, and allows to catch most geometry edges.
#0.005 is a rather overkill value, may have false positives at shallow angles.
#Note that this works in combination with smaaDepthThreshold, it is recommended to set both
smaaNormalThreshold = 0.01

#smaaDebugView allows viewing the edges detected by SMAA
#0 - no debug, SMAA active
#1 - debug, shows detected edges
smaaDebugView = 0

#Flips the depth buffer vertically
#0 - no flip
#1 - flip
depthInputIsUpsideDown = 0

#Inverts the depth stored in the depth buffer
#0 - no flip
#1 - flip
depthInputIsReverse = 0

#depthInputIsLogarithmic tells the shader whether the input is logarithmic or not
#You may see stripes or waves in the depth buffer if this is set incorrectly
#0 - not logarithmic
#1 - logarithmic
depthInputIsLogarithmic = 0

#depthMultiplier multiplies the depth values by the given number (float)
depthMultiplier = 1.0

#Sets the far edge of the linearisation process
depthLinearizationFarPlane = 1000.0

#Specifies the maximum steps performed in the horizontal/vertical pattern searches
#Range: [0, 112]
#4  - low
#8  - medium
#16 - high
#32 - ultra
smaaMaxSearchSteps = 32

#Specifies the maximum steps performed in the diagonal pattern searches
#Range: [0, 20]
#0  - low, medium
#8  - high
#16 - ultra
smaaMaxSearchStepsDiag = 16

#Specifies how much sharp corners will be rounded
#Range: [0, 100]
#25 is a reasonable value
smaaCornerRounding = 25

#Path to the LUT file that will be used
#supported are .CUBE files and .png with width == height * height
lutFile = "~/Games/vkBasalt/textures/lut.cube"

#Lights dimmer than this will not give off lens flares.
#Range: [0-1]
lensflareThreshold = 0.98
#Number of those lens flare circles
lensflareGhosts = 5
#How spread apart the lens flare ghosts are. Higher number = greater distance
lensflareDispersal = 0.35
#How intense a lens flare ghost is
lensflareIntensity = 0.5

reinhardExposure = 1.0
reinhardGamma = 2.2
reinhardUseLuminance = 1
#Use a simple algorithm for better performance
reinhardUseSimple = 0
reinhardWhitePoint = 5.0
